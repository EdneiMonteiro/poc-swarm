<text x="300.0" y="-94.8" font-size="28" fill="#1e1e1e" text-anchor="start" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="300.0" dy="0.0">POC Swarm — Fluxo Proposto v2 (SDD + doc em 2 trilhos)</tspan>
</text>
<text x="300.0" y="-58.3" font-size="13" fill="#495057" text-anchor="start" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="300.0" dy="0.0">■ verde = novo    ■ amarelo = modificado    ■ azul/roxo = mantido</tspan>
<tspan x="300.0" dy="16.2">tracejado = infra transversal</tspan>
</text>
<text x="480.0" y="51.9" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">Usuário: &quot;monte uma POC de X no Azure&quot;</tspan>
</text>
<text x="480.0" y="148.3" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">Fase 0 — Perguntas de enquadramento</tspan>
<tspan x="480.0" dy="17.5">(estilo /clarify: também resolve</tspan>
<tspan x="480.0" dy="17.5">ambiguidades que travariam a spec)</tspan>
</text>
<text x="480.0" y="276.4" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">NOVO · Fase 0.5 — Preflight antecipado (fail fast)</tspan>
<tspan x="480.0" dy="17.5">tenant/sub ativos + quota + resource providers</tspan>
<tspan x="480.0" dy="17.5">falhou? para AQUI, antes de gastar ciclos</tspan>
</text>
<text x="480.0" y="407.9" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">Fase 1 — Setup da pasta + brief.md</tspan>
</text>
<text x="480.0" y="503.6" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">NOVO · Fase 2a — spec.md (SDD)</tspan>
<tspan x="480.0" dy="17.5">REQs numerados (funcionais + não-funcionais)</tspan>
<tspan x="480.0" dy="17.5">critérios de aceitação testáveis + edge cases</tspan>
<tspan x="480.0" dy="17.5">(template inspirado no GitHub Spec Kit)</tspan>
</text>
<text x="480.0" y="648.4" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">MODIFICADO · Fase 2b — Analista</tspan>
<tspan x="480.0" dy="17.5">ADR responde à spec (o &quot;como&quot; do &quot;o quê&quot;)</tspan>
<tspan x="480.0" dy="17.5">team-plan mapeia builders/revisores → REQs</tspan>
</text>
<text x="676.0" y="571.7" font-size="13" fill="#2f9e44" text-anchor="start" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="676.0" dy="0.0">trilho 1:</tspan>
<tspan x="676.0" dy="16.2">doc de INTENÇÃO</tspan>
<tspan x="676.0" dy="16.2">(dirige a construção)</tspan>
</text>
<text x="480.0" y="778.1" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">Materializa agentes declarativos</tspan>
<tspan x="480.0" dy="17.5">(builders + revisores + coordenador + duck)</tspan>
</text>
<text x="480.0" y="892.4" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">Builders em paralelo</tspan>
<tspan x="480.0" dy="17.5">+ auto-validação shift-left (bicep build/tf validate)</tspan>
<tspan x="480.0" dy="17.5">+ doc stub da própria parte (docs-as-you-go)</tspan>
</text>
<text x="480.0" y="1024.3" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">Validação consolidada + revisores + rubber duck</tspan>
<tspan x="480.0" dy="17.5">nota por REQ da spec (não só tópico genérico)</tspan>
<tspan x="480.0" dy="17.5">rastreabilidade REQ → artefato → validação</tspan>
</text>
<text x="480.0" y="1163.6" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">Portão:</tspan>
<tspan x="480.0" dy="17.5">cada REQ ≥ A?</tspan>
<tspan x="480.0" dy="17.5">(rubrica vem</tspan>
<tspan x="480.0" dy="17.5">da spec)</tspan>
</text>
<text x="250.0" y="870.6" font-size="14" fill="#868e96" text-anchor="start" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="250.0" dy="0.0">Fase 3 — Loop de construção (máx N ciclos)</tspan>
</text>
<text x="285.0" y="1321.2" font-size="13" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="285.0" dy="0.0">Fase 4 — Deploy</tspan>
<tspan x="285.0" dy="16.2">preflight re-check → deploy RG dedicado + tags</tspan>
<tspan x="285.0" dy="16.2">+ NOVO: budget alert + tag expiration-date</tspan>
<tspan x="285.0" dy="16.2">+ smoke tests DERIVADOS dos critérios da spec</tspan>
</text>
<text x="695.0" y="1321.2" font-size="13" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="695.0" dy="0.0">NOVO · Doc de PRODUTO — parte estática</tspan>
<tspan x="695.0" dy="16.2">writers de arquitetura/segurança/custo</tspan>
<tspan x="695.0" dy="16.2">partem de spec + ADR + build/ + doc stubs</tspan>
<tspan x="695.0" dy="16.2">(em paralelo ao deploy — nada aqui espera ele)</tspan>
</text>
<text x="480.0" y="1466.3" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">Doc de PRODUTO — parte dinâmica (trilho 2)</tspan>
<tspan x="480.0" dy="17.5">deploy.md + resource-manifest + resultados de smoke</tspan>
<tspan x="480.0" dy="17.5">(única parte que PRECISA da realidade provisionada)</tspan>
</text>
<text x="480.0" y="1594.3" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">Fase 5 enxuta — consolidação</tspan>
<tspan x="480.0" dy="17.5">loop de doc reviewers + rubber duck, portão ≥ A</tspan>
<tspan x="480.0" dy="17.5">(confere doc × spec × realidade — sem contradição)</tspan>
</text>
<text x="480.0" y="1724.1" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="480.0" dy="0.0">Fase 6 — Entrega</tspan>
<tspan x="480.0" dy="17.5">final-report (matriz REQ × nota) + manifest + teardown</tspan>
</text>
<text x="290.0" y="1265.7" font-size="13" fill="#2f9e44" text-anchor="start" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="290.0" dy="0.0">sim ✓ — deploy e doc estática em PARALELO</tspan>
</text>
<text x="636.0" y="1203.7" font-size="13" fill="#e03131" text-anchor="start" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="636.0" dy="0.0">não: ciclo N+1</tspan>
<tspan x="636.0" dy="16.2">(só REQs &lt; A)</tspan>
</text>
<text x="60.0" y="1161.3" font-size="13" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="60.0" dy="0.0">Trava: max_cycles →</tspan>
<tspan x="60.0" dy="16.2">PARA e escala ao usuário</tspan>
<tspan x="60.0" dy="16.2">(nunca deploya &lt; A)</tspan>
</text>
<text x="60.0" y="500.2" font-size="13" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="60.0" dy="0.0">NOVO · Cache de fontes</tspan>
<tspan x="60.0" dy="16.2">URL verificada 1x (HTTP 200)</tspan>
<tspan x="60.0" dy="16.2">vale p/ todos os agentes</tspan>
<tspan x="60.0" dy="16.2">do dia — corta re-fetch</tspan>
</text>
<text x="60.0" y="916.2" font-size="13" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="60.0" dy="0.0">NOVO · state.json</tspan>
<tspan x="60.0" dy="16.2">checkpoint fase/ciclo/REQ</tspan>
<tspan x="60.0" dy="16.2">→ retomada após falha</tspan>
<tspan x="60.0" dy="16.2">sem repetir ciclos caros</tspan>
</text>
<text x="60.0" y="1590.2" font-size="13" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="60.0" dy="0.0">MODIFICADO · Fase E</tspan>
<tspan x="60.0" dy="16.2">evolução = diff da spec</tspan>
<tspan x="60.0" dy="16.2">(REQs novos/alterados) →</tspan>
<tspan x="60.0" dy="16.2">reativa só agentes afetados</tspan>
</text>
</svg>