<text x="300.0" y="-44.8" font-size="28" fill="#1e1e1e" text-anchor="start" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="300.0" dy="0.0">POC Swarm — Fluxo Atual</tspan>
</text>
<text x="470.0" y="57.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Usuário: &quot;monte uma POC de X no Azure&quot;</tspan>
</text>
<text x="470.0" y="159.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Fase 0 — Perguntas de enquadramento</tspan>
<tspan x="470.0" dy="20.0">(human-in-the-loop: tenant/sub/região,</tspan>
<tspan x="470.0" dy="20.0">custo, IaC, rede, teardown, ciclos)</tspan>
</text>
<text x="470.0" y="294.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Fase 1 — Setup da pasta</tspan>
<tspan x="470.0" dy="20.0">poc_id + árvore + brief.md (tópicos ≥ A)</tspan>
</text>
<text x="470.0" y="409.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Fase 2 — Analista</tspan>
<tspan x="470.0" dy="20.0">ADR (arquitetura-decision.md) + team-plan.md</tspan>
<tspan x="470.0" dy="20.0">≥ 5 fontes HTTP 200 + estado real do Azure</tspan>
</text>
<text x="470.0" y="541.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Materializa agentes declarativos (.md)</tspan>
<tspan x="470.0" dy="20.0">builders + revisores + coordenador + rubber duck</tspan>
<tspan x="470.0" dy="20.0">modelo explícito por agente</tspan>
</text>
<text x="470.0" y="676.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Builders em paralelo</tspan>
<tspan x="470.0" dy="20.0">(IaC / rede / identidade / app)</tspan>
</text>
<text x="470.0" y="791.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Validação técnica real</tspan>
<tspan x="470.0" dy="20.0">bicep build · terraform validate+plan</tspan>
<tspan x="470.0" dy="20.0">tflint · checkov · PSRule · what-if</tspan>
</text>
<text x="470.0" y="926.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Revisores técnicos</tspan>
<tspan x="470.0" dy="20.0">nota D- … A+ por tópico + sugestão acionável</tspan>
</text>
<text x="470.0" y="1044.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Rubber duck transversal</tspan>
<tspan x="470.0" dy="20.0">audita todos os agentes do ciclo</tspan>
</text>
<text x="470.0" y="1171.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Portão:</tspan>
<tspan x="470.0" dy="20.0">todos os tópicos ≥ A?</tspan>
<tspan x="470.0" dy="20.0">(A- não passa)</tspan>
</text>
<text x="250.0" y="654.6" font-size="14" fill="#868e96" text-anchor="start" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="250.0" dy="0.0">Fase 3 — Loop de construção (máx 5 ciclos)</tspan>
</text>
<text x="470.0" y="1315.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Fase 4 — Deploy</tspan>
<tspan x="470.0" dy="20.0">preflight read-only (tenant/sub batem?)</tspan>
<tspan x="470.0" dy="20.0">→ deploy em RG dedicado + tags → smoke test</tspan>
</text>
<text x="470.0" y="1447.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Fase 5 — Swarm de documentação nativo</tspan>
<tspan x="470.0" dy="20.0">doc writers → doc reviewers → rubber duck</tspan>
<tspan x="470.0" dy="20.0">loop com portão ≥ A sobre docs/</tspan>
</text>
<text x="470.0" y="1582.4" font-size="16" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="470.0" dy="0.0">Fase 6 — Entrega</tspan>
<tspan x="470.0" dy="20.0">final-report.md + manifest + teardown pronto</tspan>
</text>
<text x="478.0" y="1245.7" font-size="13" fill="#2f9e44" text-anchor="start" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="478.0" dy="0.0">  sim ✓</tspan>
</text>
<text x="638.0" y="1204.7" font-size="13" fill="#e03131" text-anchor="start" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="638.0" dy="0.0">não: ciclo N+1</tspan>
<tspan x="638.0" dy="16.2">(só tópicos &lt; A)</tspan>
</text>
<text x="110.0" y="1158.3" font-size="14" fill="#1e1e1e" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" style="white-space:pre">
<tspan x="110.0" dy="0.0">Trava: max_cycles</tspan>
<tspan x="110.0" dy="17.5">atingido → PARA e</tspan>
<tspan x="110.0" dy="17.5">escala ao usuário</tspan>
</text>
</svg>